<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migreringsguide for regnskapssystemer</title>
<style>
  :root {
    --bg: #f7f7f5;
    --card-bg: #ffffff;
    --border: #e3e1d9;
    --border-strong: #c9c6ba;
    --text: #1f1e1b;
    --text-secondary: #6b6a63;
    --text-tertiary: #9a988f;
    --accent: #185fa5;
    --accent-bg: #e6f1fb;
    --accent-text: #0c447c;
    --success: #3b6d11;
    --radius-md: 8px;

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 0.25rem;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 0 0 2rem;
  }
  .select-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 8px;
    font-weight: 500;
  }
  .system-grid {
    display: grid;

  .system-btn {

  .icon {

  .cta-btn {

    font-family: inherit;

    align-items: center;

    border: 2px solid var(--accent);

    color: var(--accent-text);

    margin-bottom: 1rem;

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-family: inherit;
    padding: 7px 12px;
    margin-bottom: 1.25rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    color: var(--text);
  }
  .back-btn:hover { border-color: var(--border-strong); }
  .header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.5rem;
    font-size: 15px;
    font-weight: 600;
  }
  .header-row .sep {
    color: var(--text-tertiary);
    font-weight: 400;
  }
  .intro-text {
    font-size: 13px;
    color: var(--text-secondary);

  }

  .progress-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .progress-bar-outer {
    height: 6px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width .2s;
    width: 0%;
  }
  .phase-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .phase-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .phase-title {
    font-size: 14px;
    font-weight: 600;
  }
  .phase-count {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .step-row {
    padding: 9px 0;
    border-top: 1px solid var(--border);
  }
  .step-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
  }
  .step-label input[type="checkbox"] {
    margin-top: 3px;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .step-title {
    font-size: 13px;
    font-weight: 500;
  }
  .step-title.done {
    color: var(--text-tertiary);
    text-decoration: line-through;
    font-weight: 400;
  }
  .step-detail {
    font-size: 12.5px;
    color: var(--text-secondary);
    margin-top: 4px;
    line-height: 1.6;
  }
  .reset-btn {
    font-size: 12px;
    font-family: inherit;
    padding: 7px 12px;
    color: var(--text-secondary);
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .reset-btn:hover { border-color: var(--border-strong); }
  .section-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 8px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Migreringsguide for regnskapssystemer</h1>
  <p class="subtitle">Velg systemet kunden flyttes fra og til, så får du en detaljert, avhukbar fremgangsmåte.</p>
  <div id="app"></div>
</div>

<script>
const SYSTEMS = ["Duett", "SB1 Regnskap / Unimicro", "Finago", "Tripletex"];

const ICONS = {
  "Duett": "&#127974;",
  "SB1 Regnskap / Unimicro": "&#128179;",
  "Finago": "&#128193;",
  "Tripletex": "&#128202;"
};

function checklist(steps) {
  return steps.map((s, i) => ({ id: "s" + i, title: s.t, detail: s.d || "" }));
}

function scenarioKey(from, to) {
  return from + "__" + to;
}

const SCENARIOS = {};

SCENARIOS[scenarioKey("Duett", "SB1 Regnskap / Unimicro")] = {
  title: "Duett \u2192 SB1 Regnskap / Unimicro",
  intro: "Standard migreringsl\u00f8p ved bytte fra Duett til SB1 Regnskap. St\u00f8rste risikopunkt er kundenummer-mismatch mellom kildesystem for fakturering (f.eks. ProdSys) og SB1 ved SAF-T-import.",
  phases: [
    {
      name: "Forberedelse og kartlegging",
      steps: checklist([
        { t: "Eksporter full kontoplan fra Duett", d: "Ta ut kontoplan med kontonummer, kontonavn, MVA-koder og evt. dimensjoner (avdeling/prosjekt). Sammenlign mot SB1 sin standard kontoplan (NS 4102) for \u00e5 identifisere avvik." },
        { t: "Eksporter kunderegister og leverand\u00f8rregister", d: "Ta ut fullstendig kunde- og leverand\u00f8rliste med organisasjonsnummer, adresse, MVA-status, betalingsbetingelser og eksisterende kundenummer/leverand\u00f8rnummer." },
        { t: "Identifiser kundenummer-kilde", d: "Avklar om kunden fakturerer direkte fra Duett eller fra et eksternt system (f.eks. ProdSys) som integreres mot regnskapssystemet. Dette avgj\u00f8r om kundenummer m\u00e5 mappes 1:1 eller kan renummereres." },
        { t: "Sjekk \u00e5pne poster (saldoliste)", d: "Hent ut \u00e5pne kunde- og leverand\u00f8rfordringer (saldobalanse pr. dato) som m\u00e5 overf\u00f8res manuelt eller via \u00e5pningsbalanse." },
        { t: "Bestem migreringsdato (cut-over)", d: "Velg en periodeslutt (typisk m\u00e5nedsskifte) som skj\u00e6ringspunkt. Alt f\u00f8r denne datoen blir i Duett (historikk), alt etter g\u00e5r i SB1." }
      ])
    },
    {
      name: "SAF-T eksport og import",
      steps: checklist([
        { t: "Generer SAF-T-fil fra Duett", d: "Bruk Duett sin innebygde SAF-T-eksport (Regnskap \u2192 Rapporter \u2192 SAF-T). Velg riktig periode \u2013 typisk hele innev\u00e6rende regnskaps\u00e5r for \u00e5 f\u00e5 med historiske transaksjoner." },
        { t: "Valider SAF-T-filen", d: "Kj\u00f8r filen gjennom Skatteetatens offisielle SAF-T-validator (XML-skjemavalidering) f\u00f8r import, for \u00e5 fange strukturfeil tidlig." },
        { t: "Sjekk SAF-T-innstillinger for kundenummer", d: "KRITISK: SAF-T-standarden bruker kundens organisasjonsnummer eller SAF-T-intern ID som n\u00f8kkel, ikke n\u00f8dvendigvis det kundenummeret kunden er vant til \u00e5 se p\u00e5 fakturaer. Sjekk eksportinnstillingene i Duett for hvilket felt som brukes." },
        { t: "Importer SAF-T i SB1 Regnskap / Unimicro", d: "Last opp filen via Unimicro sitt importgrensesnitt. Systemet oppretter automatisk kontoplan, kunder, leverand\u00f8rer og \u00e5pningsbalanse basert p\u00e5 filinnholdet." },
        { t: "Kontroller genererte kundenumre mot kildesystem", d: "Sammenlign kundenumrene SB1 har generert mot de opprinnelige numrene i Duett/ProdSys. Mismatch oppst\u00e5r typisk fordi SAF-T-importen tildeler nye l\u00f8penumre i stedet for \u00e5 beholde eksisterende." }
      ])
    },
    {
      name: "H\u00e5ndtering av kundenummer-mismatch",

        { t: "Lag sammenligningsliste (kildesystem vs. SB1)", d: "Bygg et regneark med kolonner: kundenavn, org.nr, kundenummer i kildesystem (f.eks. ProdSys), kundenummer i SB1 etter import. Marker avvik." },
        { t: "Avklar om renummerering kreves", d: "Hvis kunden fakturerer fra et eksternt system som forventer et bestemt kundenummerformat, m\u00e5 SB1-kundene renummereres til \u00e5 matche kildesystemet \u2013 ellers feiler integrasjonen eller fakturareferanser blir feil." },
        { t: "Forbered importmal for renummerering", d: "Lag en strukturert importfil (CSV/XLSX) med gammelt SB1-kundenummer \u2192 \u00f8nsket kundenummer, samt evt. kundenavn og org.nr for verifisering." },

      ])
    },
    {
      name: "\u00c5pningsbalanse og avstemming",
      steps: checklist([
        { t: "Kontroller \u00e5pningsbalanse mot Duett", d: "Sammenlign saldobalansen som er importert i SB1 mot uttrekk fra Duett p\u00e5 samme dato, konto for konto." },
        { t: "Avstem bank", d: "Sjekk at bankkontoens saldo i SB1 stemmer med faktisk kontoutskrift p\u00e5 cut-over-dato." },

      ])

  ]

    {

  };
}

function getScenario(from, to) {
  const key = scenarioKey(from, to);
  if (SCENARIOS[key]) return SCENARIOS[key];
  return genericScenario(from, to);
}

const state = {
  from: null,
  to: null,
  checked: {}
};

function loadProgress(key) {
  try {
    const raw = localStorage.getItem('migreringsguide:' + key);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function saveProgress(key, checked) {
  try {
    localStorage.setItem('migreringsguide:' + key, JSON.stringify(checked));
  } catch (e) {}
}

function renderPicker() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const fromLabel = document.createElement('div');
  fromLabel.className = 'select-label';
  fromLabel.textContent = 'Velg systemet kunden flyttes fra:';
  app.appendChild(fromLabel);

  const fromGrid = document.createElement('div');
  fromGrid.className = 'system-grid';
  SYSTEMS.forEach(sys => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'system-btn' + (state.from === sys ? ' active' : '');
    btn.innerHTML = '<span class="icon">' + ICONS[sys] + '</span><span>' + sys + '</span>';
    btn.onclick = () => { state.from = sys; renderPicker(); };
    fromGrid.appendChild(btn);
  });
  app.appendChild(fromGrid);

  const toLabel = document.createElement('div');
  toLabel.className = 'select-label';
  toLabel.textContent = 'Velg systemet kunden flyttes til:';
  app.appendChild(toLabel);

  const toGrid = document.createElement('div');
  toGrid.className = 'system-grid';
  SYSTEMS.forEach(sys => {
    const disabled = sys === state.from;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.disabled = disabled;
    btn.className = 'system-btn' + (state.to === sys && !disabled ? ' active' : '');
    btn.innerHTML = '<span class="icon">' + ICONS[sys] + '</span><span>' + sys + '</span>';
    if (!disabled) btn.onclick = () => { state.to = sys; renderPicker(); };
    toGrid.appendChild(btn);
  });
  app.appendChild(toGrid);

  if (state.from && state.to) {
    const cta = document.createElement('button');
    cta.type = 'button';
    cta.className = 'cta-btn';
    cta.textContent = 'Vis migreringsguide \u2192';
    cta.onclick = () => {
      const key = scenarioKey(state.from, state.to);
      state.checked = loadProgress(key);
      renderGuide();
    };
    app.appendChild(cta);
  }
}

function countDone(steps, checked) {
  return steps.filter(s => checked[s.id]).length;
}

function renderGuide() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const scenario = getScenario(state.from, state.to);
  const key = scenarioKey(state.from, state.to);

  const backBtn = document.createElement('button');
  backBtn.type = 'button';
  backBtn.className = 'back-btn';
  backBtn.textContent = '\u2190 Bytt scenario';
  backBtn.onclick = () => { renderPicker(); };
  app.appendChild(backBtn);

  const headerRow = document.createElement('div');
  headerRow.className = 'header-row';
  headerRow.innerHTML = '<span class="icon">' + ICONS[state.from] + '</span><span>' + state.from + '</span>' +
    '<span class="sep">\u2192</span>' +
    '<span class="icon">' + ICONS[state.to] + '</span><span>' + state.to + '</span>';
  app.appendChild(headerRow);

  const introEl = document.createElement('p');
  introEl.className = 'intro-text';
  introEl.textContent = scenario.intro;
  app.appendChild(introEl);

  let totalSteps = 0;
  scenario.phases.forEach(p => totalSteps += p.steps.length);

  const progressWrap = document.createElement('div');
  progressWrap.className = 'progress-wrap';
  const progressLabel = document.createElement('div');
  progressLabel.className = 'progress-label';
  progressLabel.id = 'progress-label';
  progressWrap.appendChild(progressLabel);
  const barOuter = document.createElement('div');
  barOuter.className = 'progress-bar-outer';
  const barInner = document.createElement('div');
  barInner.className = 'progress-bar-inner';
  barInner.id = 'progress-bar';
  barOuter.appendChild(barInner);
  progressWrap.appendChild(barOuter);
  app.appendChild(progressWrap);

  function updateProgress() {
    let done = 0;
    scenario.phases.forEach(p => { done += countDone(p.steps, state.checked); });
    const pct = totalSteps ? Math.round((done / totalSteps) * 100) : 0;
    document.getElementById('progress-label').textContent = done + ' av ' + totalSteps + ' steg fullf\u00f8rt (' + pct + '%)';
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  scenario.phases.forEach((phase, pi) => {
    const phaseCard = document.createElement('div');
    phaseCard.className = 'phase-card';

    const phaseHeader = document.createElement('div');
    phaseHeader.className = 'phase-header';
    const phaseTitle = document.createElement('div');
    phaseTitle.className = 'phase-title';
    phaseTitle.textContent = (pi + 1) + '. ' + phase.name;
    phaseHeader.appendChild(phaseTitle);
    const phaseCount = document.createElement('div');
    phaseCount.className = 'phase-count';
    phaseCount.id = 'phase-count-' + pi;
    phaseHeader.appendChild(phaseCount);
    phaseCard.appendChild(phaseHeader);

    function updatePhaseCount() {
      const done = countDone(phase.steps, state.checked);
      document.getElementById('phase-count-' + pi).textContent = done + '/' + phase.steps.length;
    }

    phase.steps.forEach(step => {
      const stepWrap = document.createElement('div');
      stepWrap.className = 'step-row';

      const stepRow = document.createElement('label');
      stepRow.className = 'step-label';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = !!state.checked[step.id];

      const textBlock = document.createElement('div');
      const titleEl = document.createElement('div');
      titleEl.className = 'step-title' + (checkbox.checked ? ' done' : '');
      titleEl.textContent = step.title;
      textBlock.appendChild(titleEl);

      if (step.detail) {
        const detailEl = document.createElement('div');
        detailEl.className = 'step-detail';
        detailEl.textContent = step.detail;
        textBlock.appendChild(detailEl);
      }

      checkbox.onchange = () => {
        state.checked[step.id] = checkbox.checked;
        titleEl.className = 'step-title' + (checkbox.checked ? ' done' : '');
        updatePhaseCount();
        updateProgress();
        saveProgress(key, state.checked);
      };

      stepRow.appendChild(checkbox);
      stepRow.appendChild(textBlock);
      stepWrap.appendChild(stepRow);
      phaseCard.appendChild(stepWrap);
    });

    app.appendChild(phaseCard);
    updatePhaseCount();
  });

  const resetBtn = document.createElement('button');
  resetBtn.type = 'button';
  resetBtn.className = 'reset-btn';
  resetBtn.textContent = '\u21bb Nullstill fremdrift for dette scenarioet';
  resetBtn.onclick = () => {
    state.checked = {};
    saveProgress(key, {});
    renderGuide();
  };
  app.appendChild(resetBtn);

  updateProgress();
}

renderPicker();
</script>
</body>
</html>
